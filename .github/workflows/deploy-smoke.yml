name: deploy smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  partridge:
    name: partridge
    runs-on: ubuntu-latest
    steps:
      - name: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: partridge.ts.alcachofa.faith

      - name: install ssh key
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${{ secrets.PARTRIDGE_DEPLOY_SSH_KEY }}" > ~/.ssh/partridge_deploy
          chmod 0600 ~/.ssh/partridge_deploy

      - name: call partridge deploy smoke
        run: |
          ssh \
            -i ~/.ssh/partridge_deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            deploy@partridge.ts.alcachofa.faith
