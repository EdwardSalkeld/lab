name: bootstrap wren direct

on:
  workflow_dispatch:
    inputs:
      advertise_tags:
        description: Comma-separated Tailscale tags for wren
        required: false
        default: "tag:ci"

jobs:
  bootstrap:
    name: bootstrap
    runs-on: ubuntu-latest
    env:
      TAILSCALE_ADVERTISE_TAGS: ${{ inputs.advertise_tags || 'tag:ci' }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
    steps:
      - name: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: partridge.ts.alcachofa.faith

      - name: install ssh keys
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${{ secrets.PARTRIDGE_DEPLOY_SSH_KEY }}" > ~/.ssh/partridge_deploy
          printf '%s\n' "${{ secrets.WREN_BILLY_SSH_KEY }}" > ~/.ssh/wren_billy
          chmod 0600 ~/.ssh/partridge_deploy ~/.ssh/wren_billy

      - name: join tailnet and verify
        run: |
          ssh_key_b64="$(base64 -w0 < ~/.ssh/wren_billy)"

          printf '%s\n%s\n%s\n%s\n' "$ssh_key_b64" "$TS_OAUTH_CLIENT_ID" "$TS_OAUTH_SECRET" "$TAILSCALE_ADVERTISE_TAGS" | ssh \
            -i ~/.ssh/partridge_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            deploy@partridge.ts.alcachofa.faith \
            configure-wren
