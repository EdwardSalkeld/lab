name: bootstrap wren direct

on:
  push:
    branches:
      - billy/wren-direct-tailnet-join
  workflow_dispatch:
    inputs:
      wren_lan_ip:
        description: LAN IPv4 address for wren
        required: false
        default: "10.4.1.227"

jobs:
  bootstrap:
    name: bootstrap
    runs-on: ubuntu-latest
    env:
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
    steps:
      - name: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: partridge.ts.alcachofa.faith

      - name: install ssh keys
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${{ secrets.PARTRIDGE_DEPLOY_SSH_KEY }}" > ~/.ssh/partridge_deploy
          printf '%s\n' "${{ secrets.WREN_BILLY_SSH_KEY }}" > ~/.ssh/wren_billy
          chmod 0600 ~/.ssh/partridge_deploy ~/.ssh/wren_billy

      - name: join tailnet and verify
        run: |
          ssh_key_b64="$(base64 -w0 < ~/.ssh/wren_billy)"

          printf '%s\n%s\n' "$ssh_key_b64" "$TS_OAUTH_SECRET" | ssh \
            -i ~/.ssh/partridge_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            deploy@partridge.ts.alcachofa.faith \
            configure-wren

          ssh \
            -i ~/.ssh/partridge_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            deploy@partridge.ts.alcachofa.faith \
            verify-wren
