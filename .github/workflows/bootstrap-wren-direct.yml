name: bootstrap wren direct

on:
  workflow_dispatch:
    inputs:
      wren_lan_ip:
        description: LAN IPv4 address for wren
        required: false
        default: "10.4.1.227"

jobs:
  bootstrap:
    name: bootstrap
    runs-on: ubuntu-latest
    env:
      WREN_LAN_IP: ${{ inputs.wren_lan_ip || '10.4.1.227' }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
    steps:
      - name: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: partridge.ts.alcachofa.faith

      - name: install ssh keys
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${{ secrets.PARTRIDGE_DEPLOY_SSH_KEY }}" > ~/.ssh/partridge_deploy
          printf '%s\n' "${{ secrets.WREN_BILLY_SSH_KEY }}" > ~/.ssh/wren_billy
          chmod 0600 ~/.ssh/partridge_deploy ~/.ssh/wren_billy

          cat > ~/.ssh/config <<'EOF'
          Host partridge-deploy
            HostName partridge.ts.alcachofa.faith
            User deploy
            IdentityFile ~/.ssh/partridge_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new

          Host wren-lan
            HostName __WREN_LAN_IP__
            User billy
            IdentityFile ~/.ssh/wren_billy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ProxyJump partridge-deploy
          EOF

          perl -0pi -e 's/__WREN_LAN_IP__/$ENV{WREN_LAN_IP}/g' ~/.ssh/config

      - name: join tailnet and verify
        run: |
          auth_key="${TS_OAUTH_SECRET}?ephemeral=false&preauthorized=true"
          auth_key_quoted="$(printf '%q' "$auth_key")"

          ssh wren-lan "sudo tailscale up --auth-key=${auth_key_quoted} --advertise-tags=tag:server --hostname=wren --ssh=false"
          ssh wren-lan 'sudo tailscale ip -4'
          ssh wren-lan 'hostnamectl --static'
          ssh wren-lan 'curl --fail --silent http://localhost | grep -F "Hello from wren"'
