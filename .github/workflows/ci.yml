name: ci

on:
  pull_request:

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - '.github/workflows/**'
              - 'terraform/**'
            nix:
              - '.github/workflows/**'
              - '.sops.yaml'
              - 'flake.lock'
              - 'flake.nix'
              - 'nixos/**'
              - 'tools/**'

  terraform:
    name: terraform
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
      - name: terraform fmt
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false
      - name: terraform validate
        run: terraform -chdir=terraform validate
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          github_token: ${{ github.token }}
          working_directory: terraform

  nix:
    name: nix
    needs: changes
    if: needs.changes.outputs.nix == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            # cache.nixos.org intermittently corrupts zstd NARs over HTTP/2
            # ("Stream error in the HTTP/2 framing layer"); force HTTP/1.1 and
            # fall back to building from source if a substitute still fails.
            http2 = false
            fallback = true
      - name: flake check
        run: nix flake check --no-update-lock-file
      - name: build partridge
        run: nix build .#nixosConfigurations.partridge.config.system.build.toplevel -o /tmp/pr-system
      - name: build main partridge
        run: |
          git fetch origin main
          git worktree add /tmp/main-worktree origin/main
          nix build /tmp/main-worktree#nixosConfigurations.partridge.config.system.build.toplevel -o /tmp/main-system
      - name: partridge closure diff
        run: nix store diff-closures /tmp/main-system /tmp/pr-system
