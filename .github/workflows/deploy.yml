name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys; never cancel an in-flight one (would leave a half-applied
# terraform run / rebuild / dangling state lock). Newer runs queue; because the
# orchestrator always works from current main, the last run applies the latest
# state.
concurrency:
  group: deploy-lab
  cancel-in-progress: false

jobs:
  # Infra first: reconcile the Proxmox VMs before rebuilding their configs.
  apply-terraform:
    name: apply-terraform
    runs-on: ubuntu-latest
    steps:
      - name: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: fourth.ts.alcachofa.faith

      - name: install ssh key
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${{ secrets.FOURTH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 0600 ~/.ssh/deploy

      # Repo is pinned to this key by the forced command on fourth, so we only
      # send the job name.
      - name: trigger apply-terraform on the orchestrator
        run: |
          ssh \
            -i ~/.ssh/deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            deploy@fourth.ts.alcachofa.faith \
            apply-terraform

  nix-switch:
    name: nix-switch
    needs: apply-terraform
    runs-on: ubuntu-latest
    steps:
      - name: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: fourth.ts.alcachofa.faith

      - name: install ssh key
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${{ secrets.FOURTH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 0600 ~/.ssh/deploy

      - name: trigger nix-switch on the orchestrator
        run: |
          ssh \
            -i ~/.ssh/deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            deploy@fourth.ts.alcachofa.faith \
            nix-switch

  bootstrap-wren:
    name: bootstrap-wren
    needs: nix-switch
    runs-on: ubuntu-latest
    steps:
      - name: tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: partridge.ts.alcachofa.faith

      - name: install ssh key
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${{ secrets.PARTRIDGE_DEPLOY_SSH_KEY }}" > ~/.ssh/partridge_deploy
          chmod 0600 ~/.ssh/partridge_deploy

      - name: configure wren from partridge
        env:
          WREN_TAILSCALE_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          WREN_FORWARD_SSH_KEY_B64="$(base64 -w0 ~/.ssh/partridge_deploy)"
          printf '%s\n%s\n' "$WREN_FORWARD_SSH_KEY_B64" "$WREN_TAILSCALE_OAUTH_SECRET" | \
            ssh \
              -i ~/.ssh/partridge_deploy \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              deploy@partridge.ts.alcachofa.faith \
              configure-wren

      - name: verify wren from partridge
        run: |
          ssh \
            -i ~/.ssh/partridge_deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            deploy@partridge.ts.alcachofa.faith \
            verify-wren
